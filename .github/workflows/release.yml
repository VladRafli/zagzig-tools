name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Builds the Windows desktop installers (msi/nsis) and the Windows TUI
  # binary. The desktop app itself is Windows-only (see README), but the TUI
  # is cross-platform, hence the separate tui-linux job below.
  release-windows:
    runs-on: windows-latest
    # The three signing secrets live as Environment secrets under
    # "production" (not Repository secrets) — the job has to opt into that
    # environment or `secrets.*` silently resolves to empty strings instead
    # of erroring, which is what caused the "Missing comment in secret key"
    # failures.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            tui

      - name: Install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "zagzig-tools ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download this release.

            `checksums.txt` lists the SHA-256 of every other asset — verify a download with
            `Get-FileHash -Algorithm SHA256 <file>` (PowerShell) or `sha256sum -c checksums.txt`
            (Linux/macOS/WSL, run from the folder you downloaded into).
          releaseDraft: true
          prerelease: false

      - name: Build zagzig-tui
        run: cargo build --release --manifest-path tui/Cargo.toml

      - name: Package zagzig-tui
        run: Compress-Archive -Path tui/target/release/zagzig-tui.exe -DestinationPath zagzig-tui-x86_64-pc-windows-msvc.zip
        shell: pwsh

      # Signs the TUI's zip with zipsign (Ed25519) so tui/src/update.rs's
      # verifying_keys() check has something real to verify — unlike the
      # desktop app, self_update doesn't get this for free from a Tauri
      # plugin. `=0.1.4` is pinned deliberately: it's the last 0.1.x release,
      # and it depends on zipsign-api "0.1.4" — the same 0.1.x line that
      # self_update (via tui/Cargo.toml) resolves to, so signing here and
      # verifying at runtime are guaranteed to speak the same format. Signing
      # in place (no -o) keeps the filename identical, which matters because
      # self_update derives its verification "context" from the asset's
      # filename.
      - name: Sign zagzig-tui
        env:
          ZIPSIGN_PRIVATE_KEY_B64: ${{ secrets.ZIPSIGN_PRIVATE_KEY }}
        shell: pwsh
        run: |
          cargo install zipsign --version "=0.1.4" --locked
          $keyPath = Join-Path $env:RUNNER_TEMP "zipsign-private.key"
          [IO.File]::WriteAllBytes($keyPath, [Convert]::FromBase64String($env:ZIPSIGN_PRIVATE_KEY_B64))
          zipsign sign zip zagzig-tui-x86_64-pc-windows-msvc.zip $keyPath
          Remove-Item $keyPath

      # SHA-256 for every asset this workflow publishes: the desktop installers +
      # their .sig files from tauri-action (already in src-tauri/target/release/bundle),
      # plus the now-signed TUI zip. This is a plain integrity check for anyone
      # downloading directly from the release page — the actual authenticity
      # checks each app's own auto-update path relies on are the minisign
      # .sig files (desktop) and the zipsign signature above (TUI), not this
      # file; checksums.txt just covers manual/direct downloads.
      - name: Generate checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File
          $assets += Get-Item zagzig-tui-x86_64-pc-windows-msvc.zip
          $lines = $assets | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          Set-Content -Path checksums.txt -Value $lines -Encoding utf8

      - name: Attach zagzig-tui and checksums to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" zagzig-tui-x86_64-pc-windows-msvc.zip checksums.txt --clobber --repo "${{ github.repository }}"

  # Builds and signs zagzig-tui for Linux. Runs after release-windows (not
  # in parallel) because it appends to the checksums.txt that job already
  # uploaded, and because the draft release has to exist before this job
  # can upload into it.
  tui-linux:
    needs: release-windows
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui

      - name: Build zagzig-tui
        run: cargo build --release --manifest-path tui/Cargo.toml

      # -j (junk paths) so the zip stores just "zagzig-tui" at its root,
      # matching self_update's bin_path_in_archive expectation — same
      # requirement as the Windows job's Compress-Archive step.
      - name: Package zagzig-tui
        run: zip -j zagzig-tui-x86_64-unknown-linux-gnu.zip tui/target/release/zagzig-tui

      # Same zipsign key/version as release-windows — see the comment on
      # that job's "Sign zagzig-tui" step for why =0.1.4 is pinned.
      - name: Sign zagzig-tui
        env:
          ZIPSIGN_PRIVATE_KEY_B64: ${{ secrets.ZIPSIGN_PRIVATE_KEY }}
        run: |
          cargo install zipsign --version "=0.1.4" --locked
          key_path="$RUNNER_TEMP/zipsign-private.key"
          echo -n "$ZIPSIGN_PRIVATE_KEY_B64" | base64 -d > "$key_path"
          zipsign sign zip zagzig-tui-x86_64-unknown-linux-gnu.zip "$key_path"
          rm "$key_path"

      # Downloads the checksums.txt release-windows already uploaded, adds
      # this platform's line, and re-uploads it — rather than each job
      # generating its own separate file.
      - name: Append checksum and attach to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" -p checksums.txt --clobber
          sha256sum zagzig-tui-x86_64-unknown-linux-gnu.zip >> checksums.txt
          gh release upload "${{ github.ref_name }}" zagzig-tui-x86_64-unknown-linux-gnu.zip checksums.txt --clobber --repo "${{ github.repository }}"
